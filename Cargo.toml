# ===== umbrella `proxima` package (formerly rust/Cargo.toml) =====
[package]
name = "proxima"
description = "Config-driven proxy and middleware runtime for faking, replaying, caching, or fronting dependencies from composable pipe specs"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true

[dependencies]
libc = { workspace = true, optional = true }
proxima-macros = { workspace = true, optional = true }
proxima-test = { workspace = true }
proxima-core = { workspace = true }
proxima-primitives = { workspace = true, features = ["std"] }
proxima-runtime = { workspace = true, features = ["std"] }
proxima-net = { workspace = true, features = ["std"] }
proxima-pgwire = { workspace = true, optional = true }
proxima-tls = { workspace = true, optional = true }
proxima-http = { workspace = true }
proxima-quic = { workspace = true, optional = true }
proxima-recording = { workspace = true, features = ["pipe", "replay"] }
proxima-protocols = { workspace = true, features = ["proxy_protocol-std"] }
proxima-redis = { workspace = true, optional = true }
proxima-telemetry = { workspace = true }
prime = { workspace = true, optional = true }
proxima-listen = { workspace = true }
proxima-patterns = { workspace = true, features = ["balancer", "middleware", "control_plane", "kv"] }
proxima-codec = { workspace = true, features = ["std"] }
proxima-config = { workspace = true, features = ["std", "schema", "schema-std", "store", "store-std", "sugar"] }
arc-swap.workspace = true
async-stream = { workspace = true }
async-tungstenite = { workspace = true, features = ["handshake", "futures-03-sink", "tokio-runtime"], optional = true }
base64 = { workspace = true }
bumpalo = { workspace = true, features = ["collections"] }
futures-timer = { workspace = true, optional = true }
bytes.workspace = true
cel-interpreter = { workspace = true }
core_affinity = { workspace = true, optional = true }
crossbeam-queue = { workspace = true }
dashmap.workspace = true
fastrand = { workspace = true }
flume = { workspace = true, optional = true }
# `executor` backs the tokio-free `sync::task` JoinSet AND test_support's
# `futures::executor::block_on` test driver (no tokio runtime needed to
# drive a plain `#[test]` async body).
futures = { workspace = true, features = ["executor"] }
hdrhistogram.workspace = true
http.workspace = true
http-body.workspace = true
# httparse: sans-io HTTP/1.x head parser used by hyper. SIMD-validated,
# zero-copy, battle-tested. We do NOT reimplement what it does — only
# the connection state machine + body decoder + response writer + any
# protocol semantics httparse doesn't cover.
httparse = { workspace = true }
http-body-util.workspace = true
hyper = { workspace = true, features = ["http1", "http2", "client", "server"], optional = true }
hyper-rustls = { workspace = true, features = ["http1", "http2", "native-tokio", "aws-lc-rs", "webpki-tokio"], optional = true }
hyper-util = { workspace = true, features = ["tokio", "client", "client-legacy", "server", "server-auto"], optional = true }
json5 = { workspace = true }
num_cpus = { workspace = true }
pin-project-lite.workspace = true
# proxima-patterns::kv's CacheEntry exposes a portable_atomic::AtomicU64 field this crate constructs directly.
portable-atomic = { workspace = true, default-features = false }
postcard = { workspace = true, features = ["alloc"] }
quick-xml = { workspace = true, features = ["serialize"] }
quinn = { workspace = true, features = ["rustls-aws-lc-rs", "runtime-tokio"], optional = true }
rcgen = { workspace = true, features = ["aws_lc_rs", "pem"], optional = true }
regex = { workspace = true }
ron = { workspace = true }
rustls = { workspace = true, features = ["std", "aws_lc_rs", "tls12"], optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_norway = { workspace = true }
simd-json.workspace = true
smallvec = { workspace = true }
# socket2: low-level socket construction for SO_REUSEPORT per-core
# accept lanes. Lets us bind N TcpListeners to the same address so
# the kernel hash-distributes incoming connections across cores.
socket2 = { workspace = true, features = ["all"] }
tempfile.workspace = true
thiserror.workspace = true
thread_local = { workspace = true }
time = { workspace = true, features = ["formatting", "parsing", "macros", "serde", "serde-human-readable"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "net", "sync", "time", "signal", "io-util", "fs", "io-std", "process"], optional = true }
tokio-rustls = { workspace = true, features = ["aws_lc_rs", "tls12"], optional = true }
tokio-util = { workspace = true, features = ["rt", "compat", "io"], optional = true }
toml.workspace = true
tracing.workspace = true
ulid = { workspace = true, features = ["serde"] }
url = { workspace = true }
xxhash-rust = { workspace = true, features = ["xxh3"] }
zstd = { workspace = true }
webpki-roots = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }
h2 = { workspace = true, features = ["unstable"], optional = true }
rustc-hash = { workspace = true }
bon = { workspace = true }
conflaguration = { workspace = true, features = ["derive", "toml"] }
h3 = { workspace = true, optional = true }
quinn-proto = { workspace = true, features = ["rustls-aws-lc-rs"], optional = true }
h3-quinn = { workspace = true, optional = true }
crossbeam-deque = { workspace = true }
blake3 = { workspace = true }
parking_lot = { workspace = true }
crossbeam-utils = { workspace = true }
# prod-optional: pulled in by the `c10-out-otlp-http` telemetry sub-flag for
# OTLP request encoding. Dev-deps also carry prost 0.14 as the P9b baseline.
prost = { workspace = true, features = ["std", "derive"], optional = true }

[dependencies.tracing-subscriber]
workspace = true
features = ["env-filter"]
optional = true

# `tokio-uring` swaps epoll for io_uring on Linux. Optional, gated by
# the `io-uring` feature + `cfg(target_os = "linux")`. macOS/Windows
# builds compile without it; the per-core worker stays on the default
# tokio current-thread runtime when the feature is on but the target
# isn't Linux.
[target.'cfg(target_os = "linux")'.dependencies]
io-uring = { workspace = true, optional = true }
tokio-uring = { workspace = true, optional = true }

[dev-dependencies]
criterion = { workspace = true, features = ["html_reports", "async_tokio"] }
loom = { workspace = true }
proxima-macros = { workspace = true }
# codec-trait e2e composition bench (C11) — dev-only, gated by feature.
proxima-protocols = { workspace = true, features = ["websocket_frame-codec-trait", "http1_codec-codec-trait"] }
# bench_codec_e2e only drives the `FrameCodec` trait (alloc-tier); no
# registry/JsonCodec std surface needed here.
proxima-codec = { workspace = true, features = ["alloc"] }
# serve_parity integration test drives both acceptor factories directly
# (proxima_net::tokio::TokioAcceptorFactory + proxima_net::prime::PrimeAcceptorFactory).
# proxima-net is already a non-optional [dependencies] entry above with the
# `tokio` feature on; `prime` + `runtime-prime-inbox-alloc` come from the
# default `http-prime-deps` feature, so no separate dev-dependency is needed.
http-body-util.workspace = true
pingora-core = { workspace = true }
pingora-http = { workspace = true }
# baseline for P5 — RESP3 parser comparison only, dev-only.
redis-protocol = { workspace = true }
# baseline for P9b — protobuf varint codec comparison only, dev-only.
# bumped 0.13 → 0.14 to align with opentelemetry-proto 0.32's prost requirement.
prost = { workspace = true, features = ["std", "derive"] }
# baselines for the telemetry component benches (c1-c12) — dev-only.
faster-hex = { workspace = true }
hex = { workspace = true }
log = { workspace = true }
metrics = { workspace = true }
opentelemetry = { workspace = true, features = ["logs", "metrics"] }
opentelemetry_sdk = { workspace = true, features = ["testing", "trace"] }
opentelemetry-proto = { workspace = true, features = ["gen-tonic-messages", "trace", "logs", "metrics"] }
prometheus = { workspace = true }
rand = { workspace = true }
slog = { workspace = true }
flume = { workspace = true }
# baseline for P11 — WebSocket frame codec comparison only, dev-only.
tungstenite = { workspace = true }
# baseline for P1 — DNS message parser comparison only, dev-only.
hickory-proto = { workspace = true }
# baseline for P2 — MQTT v3.1.1 packet parser comparison only, dev-only.
mqttbytes = { workspace = true }
# baseline for P3 — AMQP 0-9-1 frame parser comparison only, dev-only.
amq-protocol = { workspace = true }
# baseline for P4 — Kafka wire-protocol header decode comparison
# only, dev-only. Scope-mismatched reference (kafka-protocol returns
# owned RequestHeader with IndexMap of tagged fields; proxima borrows
# from &[u8]). Same shape as prost-vs-proxima in P9b: incumbent does
# strictly more work; the delta includes scope reduction, not pure
# parser-shape advantage. Earlier comment ("0.13 fails to build")
# was resolved upstream by 0.14; 0.17 builds cleanly.
kafka-protocol = { workspace = true }
rstest.workspace = true
temp-env = { workspace = true }
trybuild = { workspace = true }
tempfile.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter"] }
once_cell = "1.21.4"

[lints]
workspace = true

[features]

# Default features list every dep explicitly — no rollups. Callers who
# want a thinner build switch `default-features = false` and add back
# the wire versions they need.
default = [
    # `serve-prime` makes PrimeRuntime the default serve+chain runtime —
    # tokio is NOT in the default dependency graph at all (verify with
    # `cargo tree -e normal -i tokio`). `http2`/`http3` resolve to the
    # native, tokio-free drivers. Opt into the tokio-backed capability
    # set (sister-tokio serve runtime, hyper, quinn-compat h3, h1) with
    # `--features tokio`; `http1` specifically needs `tokio` because its
    # connection driver has no sans-IO implementation yet (h2/h3 do).
    "serve-prime",
    "http2", "http3",
    "histogram", "macros",
    # prime is the DEFAULT `http` upstream backend. The dep bundle is
    # always pulled (proxima_net::prime is empty on non-unix via its own
    # `#![cfg]`, so it links everywhere); the registration sites pick prime
    # on unix and fall back to the hyper factory on non-unix or when the
    # `http-hyper` opt-out is on. (Also reachable transitively via
    # `serve-prime`; listed explicitly for clarity.) See load.rs / app_builder.rs.
    "http-prime-deps",
]
# runtime-prime-full dropped from default after the prime crate extraction:
# the workspace resolver lifts proxima-runtime's runtime-prime-full feature
# across all members, which left the prime crate's standalone build seeing
# a 2-arg SpawnRequest while its own feature was off — type mismatch.
# Enable explicitly via `--features runtime-prime-full` when you need
# cross-core span propagation.
loom = []
tracing-init = ["dep:tracing-subscriber", "proxima-telemetry/tracing-init"]

# S3 of the proxima-notify initiative: producer-graph schema in
# ProximaSettings. Adds a `producers:` map registered alongside listeners /
# upstreams / middlewares / pipes; producers resolve through
# `LoadContext::source_registry` (a `SourceFactory` registry) into
# `App::source` entries, which `App::run_until_signal` now drives
# unconditionally (proxima-primitives::pipe TARGET 4 — sources run once registered, the
# same way a handler serves once mounted; no separate opt-in flag needed).
# Default off — opt-in until the substrate is sealed.
# See docs/proxima-notify/discipline.md S3 row.
producer-graph-config = []

# `sync-wrappers` adds the runtime-agnostic `proxima::sync` + `proxima::time`
# module surfaces (mpsc, watch, broadcast, Notify, Mutex/RwLock/Semaphore/oneshot
# re-exports, sleep/timeout/interval). Default off — the surfaces are intended
# to be folded into their own crates during the workspace decomposition
# (see the cached-tumbling-starlight plan). Until
# then they live as dead-code modules behind this feature so they're available
# for the decomposition without affecting default builds.
sync-wrappers = [
    "dep:futures-timer",
]

# HTTP wire version gates. `http1` is the ALPN h1(+h2+tls) combiner
# listener — its connection driver (proxima-http's `http1::serve`) has
# no sans-IO implementation yet, so it requires `tokio`. `http2` is the
# native h2c listener (no `tokio`, no external `h2` crate — server.rs /
# client.rs / listener.rs's factory path are all futures-io). `http3` is
# the native sans-IO QUIC+H3 stack (no `tokio`, no quinn). No rollup —
# pick the wire versions you actually use.
http1 = ["tokio", "proxima-http/http-listener"]
http2 = ["proxima-http/http2-native"]
http3 = ["quic-native", "proxima-http/http3-native"]
# `tls` enables https upstreams (rustls + hyper-rustls) AND https
# listener termination for the h1/ALPN combiner (tokio-rustls + rcgen
# for self-signed dev certs). Off by default; enable for either side.
# Plan-locked crypto backend: aws-lc-rs. Coupled to the h1 combiner
# today (proxima-http/tls -> http-listener -> http1), so it requires
# `tokio` the same way `http1` does; h2/h3-native don't need it to
# serve plaintext/h2c or QUIC+TLS (which carries its own rustls path).
tls = [
    "tokio",
    "dep:proxima-tls",
    "proxima-http/http1-tls",
    "proxima-listen/tls",
    "proxima-http/tls",
    "dep:rustls",
    "dep:hyper-rustls",
    "dep:tokio-rustls",
    "dep:rcgen",
]

# `http-prime-deps` pulls the prime-native HTTP/1.1 client stack
# (proxima-http `http1-stream-client`: prime TCP + client TLS + the h1
# client — no hyper, no tokio in the request path). This is part of
# `default`, so prime is the DEFAULT `"http"` upstream backend: the
# registration sites (load.rs / app_builder.rs) register
# `PrimeHttpPipeFactory` for `"http"` on unix, and fall back to the
# hyper `HttpPipeFactory` on non-unix (proxima_net::prime is macOS/Linux
# only) or when `http-hyper` is on. `http-prime` is kept as an alias
# for callers / docs that referenced the old opt-in name.
http-prime-deps = [
    "proxima-http/http1-stream-client",
    "proxima-net/prime",
    # proxima_net::prime is empty without this (see its module cfg gate in
    # proxima-net/src/lib.rs — `prime::os::net` needs the alloc-backed inbox,
    # not the mutually exclusive `runtime-prime-inbox-const`); without it
    # proxima-http's `prime_upstream` module fails to resolve
    # `PrimeTcpUpstream` / `ConnectTunneledUpstream`.
    "runtime-prime-inbox-alloc",
    "dep:proxima-tls",
    "proxima-tls/futures-io",
]
http-prime = ["http-prime-deps"]

# `pgwire-client` registers the `pgwire` protocol factory so `proxima::Client`
# speaks PostgreSQL — `{"type":"pgwire", "dsn": "postgres://..."}` or the
# `.pgwire(dsn)` builder sugar. Pulls the pgwire client over the prime TCP
# transport (http-prime-deps brings proxima_net::prime / PrimeTcpUpstream).
pgwire-client = ["http-prime", "dep:proxima-pgwire", "proxima-pgwire/client"]

# `redis-client` registers the `redis` protocol factory so `proxima::Client`
# speaks Redis/Valkey — `{"type":"redis", "dsn": "redis://..."}` or the
# `.redis(dsn)` / `.valkey(dsn)` builder sugar. Pulls the redis client over the
# prime TCP transport (http-prime-deps brings proxima_net::prime /
# PrimeTcpUpstream). Valkey shares the factory — same RESP wire protocol.
redis-client = ["http-prime", "dep:proxima-redis", "proxima-redis/client"]

# `http-hyper` is the OPT-OUT: it restores the hyper-backed `HttpPipeFactory`
# as the registered `"http"` backend even on unix. Hyper is not required for
# the default build, but it stays reachable for callers who want it (e.g.
# parity benchmarks, or environments where the prime reactor is undesirable).
http-hyper = ["tokio", "http1", "dep:hyper", "dep:hyper-util", "tokio-runtime"]

# `tokio-runtime` enables the tokio-backed listener / upstream impls.
# the trait surface itself (`stream::StreamListener` etc.) is runtime-
# neutral via futures::io; this feature only gates the tokio-specific
# implementations under listeners::tokio_stream and upstreams::tokio_stream.
tokio-runtime = []

# The single opt-in that restores the ENTIRE tokio capability set: the
# `tokio`/`tokio-util` deps themselves (non-optional in every prior build
# of this crate; optional now), `tokio::process` child-process upstreams +
# scenario orchestration, the MCP stdio/socket listener, OS signal handling
# in `Server`'s `wait_for_signal`, `block_on_tokio`, the tokio-native
# legacy accept-loop fallbacks in proxima-listen/proxima-http/proxima-tls
# (used when no `AcceptorFactory` is injected or no sans-IO driver exists —
# h1's driver, notably), and the sister-tokio-compat prime worker handle.
# Everything downstream that genuinely needs a tokio runtime (http1, tls,
# tcp/udp/unix, quic, websocket, http-hyper, io-uring) requires this
# feature explicitly rather than the reverse, so enabling e.g. `http2`
# alone never pulls tokio in.
tokio = [
    "tokio-runtime",
    "dep:tokio",
    "dep:tokio-util",
    # the external `h2` crate: only used by benches/e2e tests comparing
    # proxima's native h2 driver against it (never by proxima's own code —
    # `crate::h2` is the native module). Tokio-coupled (needs
    # `tokio::io::{AsyncRead,AsyncWrite}`), so it rides this feature.
    "dep:h2",
    "proxima-listen/tokio",
    "proxima-tls?/tokio",
    "proxima-net/tokio",
    "proxima-primitives/runtime-tokio",
    "proxima-protocols/proxy_protocol-tokio-runtime",
    # restores the sister-tokio-compat prime worker (each prime worker
    # enters a tokio Handle so user pipes calling tokio::{time,sync,spawn}
    # keep working) — the original default behaviour before this crate's
    # tokio-optional migration. `prime/prime-tokio-compat` is the `prime`
    # crate's own feature, NOT the umbrella `prime-tokio-compat` rollup
    # (which also flips the serve runtime to tokio via `runtime-tokio`).
    "prime?/prime-tokio-compat",
    "run-prime-tokio-compat",
    # restores the sister-tokio Handle on `#[proxima::test]`'s shared prime
    # test runtime too (see `serve-prime`'s `proxima-test/test-prime`).
    "proxima-test/test-prime-tokio-compat",
]

# byte-stream protocols. the only backend today (`proxima_net::tokio`)
# is tokio-native — no prime equivalent exists yet for the generic
# pipe-passthrough `StreamListener`/`StreamUpstream` surface — so these
# require `tokio` explicitly. Layered separately so a future prime/DPDK
# backend can compose tcp without pulling tokio listeners.
tcp = ["tokio", "tokio-runtime", "proxima-listen/stream", "proxima-protocols/json_framing-std"]
unix = ["tokio", "tokio-runtime", "proxima-listen/stream"]
websocket = ["tokio", "tokio-runtime", "tcp", "dep:async-tungstenite", "proxima-http/websocket"]
# proxima-side outbound WebSocket upstream (P8 in docs/protocol-gap/discipline.md).
# pulls in the same async-tungstenite the listener uses; client-side handshake +
# message exchange wrapped in a `Pipe`-compatible upstream. default off.
websocket-upstream = ["websocket"]
# RESP3 (Redis Serialization Protocol v3) listener (P5). sans-IO parser
# + minimal TCP wire-up. Compared against `redis-protocol` crate in the
# bench harness — that's the named baseline in
# docs/protocol-gap/discipline.md.
redis-listener = ["dep:proxima-redis", "tokio-runtime", "tcp"]
# DNS substrate (P1) — sans-IO RFC 1035 / RFC 3596 parser. minimum
# viable resolver target. compared against `hickory-proto::Message`
# scope-mismatched + a parity-scoped hand-rolled baseline in the
# bench harness so the Compare-bench gate cell passes honestly.
dns-substrate = ["proxima-protocols/dns"]
# proxima-side outbound HTTP/3 upstream (P7 in docs/protocol-gap/discipline.md).
# pulls in the same h3 + h3-quinn the listener uses, plus webpki-roots for
# default trust roots. compared in the bench harness against a hand-rolled
# h3-quinn parity baseline. default off.
h3-upstream = ["http3", "http3-quinn-compat", "dep:webpki-roots"]
# proxima-side outbound HTTP/3 upstream over the NATIVE sans-IO QUIC + H3
# stack (C42, docs/proxima-quic/discipline.md) — the dual-surface peer of
# `h3-upstream` (P7, quinn), selectable side-by-side per the C41 ruling.
# Default off (disciplined-component gate-1 firewall until C43's
# compare-bench vs the quinn upstream seals it). The native upstream facade
# itself uses a `tokio::sync::Mutex` today, so this still needs `tokio`.
h3-native-upstream = ["http3", "tokio", "proxima-http/http3-native-upstream", "dep:webpki-roots"]
# Routes the native h3 CLIENT response path (rekt_h3_load's part-source
# arm) through `proxima_primitives::pipe::part::PartSource` instead of the owned
# `H3ClientEvent::ResponseHeaders` event (design doc step 3, h3 first —
# `docs/proxima-pipe/part-source-sink-design.md`). Requires
# `h3-native-upstream`. Default off.
h3-part-source = ["h3-native-upstream", "proxima-http/http3-part-source"]
# gRPC framing primitive (P9 in docs/protocol-gap/discipline.md).
# sans-IO 5-byte length-prefix codec: 1-byte compression flag + u32 BE
# message length + message payload. Listener-/upstream-agnostic; the
# h2 wire (which is what gRPC rides) is delegated to existing http2.
# compared in the bench harness against a hand-rolled parity baseline
# AND `prost`'s framing for a scope-mismatched reference. default off.
grpc-framing = ["proxima-protocols/grpc_framing"]
# Protobuf wire-format primitive (P9b in docs/protocol-gap/discipline.md).
# sans-IO varint codec + wire-type / tag dispatch / field iterator. Schema-
# agnostic — proxima middleware can route/inspect protobuf messages by tag
# without compiling .proto files. Compared in the bench harness against
# both a hand-rolled parity baseline AND `prost::encoding::decode_varint`
# as a scope-matched reference (prost is the standard Rust protobuf crate).
# default off.
protobuf-wire = ["proxima-protocols/protobuf_wire"]
# Memcached text-protocol listener (P6 in docs/protocol-gap/discipline.md).
# sans-IO parser for the ASCII protocol (get / set / delete / incr / decr /
# flush_all / version / quit / stats / touch). Binary protocol is a follow-up.
# Compared in the bench harness against a hand-rolled parity baseline.
# default off.
memcached-listener = ["proxima-protocols/memcached", "tokio-runtime", "tcp"]
# MQTT v3.1.1 listener (P2 in docs/protocol-gap/discipline.md). sans-IO
# parser for the binary packet format: 1-byte type+flags + 1-4 byte varint
# remaining length + variable header + payload. Covers the routing-critical
# subset (CONNECT, PUBLISH, SUBSCRIBE, etc.). v5 is a follow-up sibling.
# Compared in the bench harness against a hand-rolled parity baseline.
# default off.
mqtt-listener = ["proxima-protocols/mqtt", "tokio-runtime", "tcp"]
# AMQP 0-9-1 listener (P3 in docs/protocol-gap/discipline.md). sans-IO
# parser for the binary frame format used by RabbitMQ + native AMQP brokers.
# Fixed 7-byte header (type/channel/length) + payload + trailing 0xCE.
# Method frames decode class_id + method_id for routing. Sub-flag default off.
amqp-listener = ["proxima-protocols/amqp", "tokio-runtime", "tcp"]
# Kafka wire-format listener (P4 in docs/protocol-gap/discipline.md).
# sans-IO parser for the 4-byte length-prefix framing + request header
# (api_key + api_version + correlation_id + client_id). Schema-agnostic
# enough that substrate middleware can route by API key without
# compiling .schema files. Sub-flag default off.
kafka-listener = ["proxima-protocols/kafka", "tokio-runtime", "tcp"]
# WebSocket sans-IO frame codec (P11 in docs/protocol-gap/discipline.md).
# RFC 6455 frame parsing/encoding decoupled from async-tungstenite so
# substrate middleware can inspect frames without round-tripping through
# the io layer. Compared in the bench harness against
# `tungstenite::protocol::frame::FrameHeader` as the scope-matched
# reference. default off.
websocket-frame = ["proxima-protocols/websocket_frame"]
# `quic-native` is proxima-quic's tokio-free sans-IO facade (prime-driven).
# `quic` is the legacy quinn-compat shim over the upstream quinn/quinn-proto
# crates — genuinely tokio (quinn itself requires `runtime-tokio`), so it
# requires `tokio`. `http3` (default) only needs `quic-native`;
# `http3-quinn-compat` layers the quinn backend back in under `tokio`.
quic-native = ["dep:proxima-quic", "proxima-quic/native", "dep:rustls", "dep:rcgen"]
quic = ["tokio", "tokio-runtime", "dep:proxima-quic", "dep:quinn", "dep:rustls", "dep:rcgen", "proxima-quic/quinn-compat"]
# proxima-quic ships two independently-gated surfaces (native sans-IO facade,
# quinn-compat shim over the upstream quinn/quinn-proto crates); `stream_listener`
# and its listener types only exist under the crate's own `quinn-compat` feature.
# `quic` forwards into it explicitly rather than riding proxima-quic's defaults,
# so the listener re-exports in `src/listeners/mod.rs` don't silently break if
# those defaults ever change.
quinn-compat = ["quic"]
# Legacy h3 backend (`h3` + `h3-quinn` crates over `quic`'s quinn transport).
# `http3` (default) is native-only; this restores the original quinn-based
# `H3ListenProtocol` / `Http3Upstream` behind `tokio`.
http3-quinn-compat = ["http3", "tokio", "quic", "proxima-http/http3-quinn-compat", "dep:quinn-proto", "dep:h3", "dep:h3-quinn"]

# packet protocols. tokio is the only backend today; afxdp is linux-only
# kernel-bypass; dpdk is the skeleton backend (returns Unsupported).
udp = ["tokio", "tokio-runtime"]
xdp = ["proxima-net/xdp"]
dpdk = ["proxima-net/dpdk"]
tokio-rustls = ["tokio", "dep:tokio-rustls"]
# the default `Runtime` impl: N tokio current-thread runtimes pinned per core.
# Pulls in `core_affinity` for OS-level CPU pinning and `flume` for cross-core
# task dispatch. Enables the `runtime::tokio_per_core` module.
runtime-tokio = ["tokio-runtime", "proxima-runtime/tokio", "dep:core_affinity", "dep:flume"]

# `io-uring` enables the completion-based io_uring backend on Linux ≥6.x.
# Composes with either runtime feature; the active runtime selects the
# backend crate at cfg-time:
#   - runtime-tokio + io-uring → tokio current-thread + tokio-uring
#   - runtime-prime + io-uring → prime workers + bare io-uring crate
# Linux-only deps via target-gated [dependencies]; macOS/Windows builds
# accept the feature flag but fall back to the readiness path.
io-uring = ["dep:tokio-uring", "dep:io-uring", "dep:webpki-roots", "proxima-http/http1-io-uring"]
rayon = ["dep:rayon", "proxima-runtime/rayon", "prime?/rayon"]
quinn-proto = ["dep:quinn-proto"]
h3 = ["dep:h3"]
h3-quinn = ["dep:h3-quinn"]

# experimental from-scratch per-core runtime (see docs/runtime-prime/).
# layered so each component can be exercised in isolation. Sub-flags
# exist so individual primitives (inbox, timer, reactor, executor, bgpool)
# can be built/tested/benched alone. No "-full" rollup; call sites that
# want "everything prime" list the four primitives explicitly:
# `runtime-prime-{executor, inbox-alloc, reactor, bgpool}`.
# core/ submodule is no_std + alloc; os/ submodule is std + libc.
runtime-prime             = ["dep:prime", "prime/runtime-prime"]
runtime-prime-inbox-alloc = ["runtime-prime", "prime/runtime-prime-inbox-alloc", "proxima-net/runtime-prime-inbox-alloc"]
runtime-prime-inbox-const = ["runtime-prime", "prime/runtime-prime-inbox-const", "proxima-net/runtime-prime-inbox-const"]
runtime-prime-inbox-dynamic = ["runtime-prime", "prime/runtime-prime-inbox-dynamic"]
runtime-prime-timer       = ["runtime-prime", "prime/runtime-prime-timer"]
runtime-prime-reactor     = ["runtime-prime", "dep:libc", "prime/runtime-prime-reactor"]
runtime-prime-executor    = ["runtime-prime-timer", "prime/runtime-prime-executor"]
runtime-prime-bgpool      = ["runtime-prime", "prime/runtime-prime-bgpool"]
# marker feature gating the optional span-carry arms of bench_c15_prime_hooks
c15-prime-hooks           = []
# the full prime runtime needed to serve on prime sockets: executor + inbox +
# reactor + bgpool, plus the prime `http` upstream dep bundle. This is what the
# default build pulls so PrimeRuntime is the serve+chain runtime out of the box.
serve-prime = [
    "runtime-prime-executor",
    "runtime-prime-inbox-alloc",
    "runtime-prime-reactor",
    "runtime-prime-bgpool",
    "http-prime-deps",
    # `#[proxima::test]`'s adaptive-default driver (no explicit `runtime =
    # ...`) picks prime whenever `proxima-test/test-prime` is linked, tokio
    # otherwise (proxima-test's own default). Without this, every bare
    # `#[proxima::test]` in the tree — including this crate's own — falls
    # back to tokio and needs the `tokio` feature just to compile.
    "proxima-test/test-prime",
    # NOTE: the sister-tokio-compat forwarding (`prime/prime-tokio-compat` +
    # `run-prime-tokio-compat`) that used to live in this default bundle now
    # rides the `tokio` feature instead (see its block below) — `prime`'s own
    # `prime-tokio-compat` feature pulls `dep:tokio`, so forwarding it from a
    # `default` feature would link tokio into every default build, defeating
    # the tokio-optional migration (`cargo tree -e normal -i tokio` must stay
    # empty here).
]
# rayon-backed variant of BackgroundPool. enables the typed spawn<F,T>
# fast-path on RayonBackgroundPool, gated separately so M1 builds can
# keep the proxima default without pulling rayon's work-stealing threads.
runtime-prime-bgpool-rayon = ["runtime-prime-bgpool", "dep:rayon", "prime/runtime-prime-bgpool-rayon"]
# recursive-split parallel reduce / map on ProximaBackgroundPool. competes
# with rayon's `par_iter` shape — adaptive splitting + tree-shaped reduce —
# without adding work-stealing to the executor. data showed proxima at
# par_iter parity on flat 16-chunk dispatch; this layer goes further.
runtime-prime-bgpool-par   = ["runtime-prime-bgpool", "prime/runtime-prime-bgpool-par"]
# polling-worker mode: each worker thread also owns a tokio current_thread
# runtime used to `block_on` `Job::Async` futures. unlocks `spawn_async`
# on the pool and the `map_async` family on `ProximaParIter`. without this
# feature, par_iter is sync-closure-only.
runtime-prime-bgpool-async = ["runtime-prime-bgpool", "prime/runtime-prime-bgpool-async"]
# optional runtime override of compiled-in sizing — point `PROXIMA_RUNTIME_CONFIG`
# at a TOML using the same schema as prime-runtime.toml; missing keys fall back
# to compiled. Per-machine tuning without a rebuild.
runtime-prime-config      = ["runtime-prime", "prime/runtime-prime-config"]
# internal marker for `run_prime` (the relocated former
# proxima-runtime-prime crate, now `src/runtime.rs`): selects
# `PrimeRuntime::new_with_tokio_compat` over the plain `PrimeRuntime::new` for
# the one-core runtime it boots. Deliberately separate from the
# `prime-tokio-compat` rollup below — that feature also pulls `runtime-tokio`
# (flips the SERVE runtime to tokio), which `serve-prime` forwarding into this
# marker must not do. Self-sufficient: pulls the `prime` crate feature its own
# `PrimeRuntime::new_with_tokio_compat` needs, regardless of what forwards it.
run-prime-tokio-compat = ["prime/prime-tokio-compat"]
# P2 of the tokio-elimination plan: optional nested-tokio compat mode
# for users who want to keep their `tokio::{spawn, sync, time}` imports
# while running on prime. Off by default; only ships once the bench
# matrix in `docs/runtime-prime/discipline-prime-tokio-compat.md`
# clears the plan's ship criteria. No rollup — call sites that want
# "everything prime" list the four primitives explicitly.
prime-tokio-compat = [
    "runtime-prime-executor",
    "runtime-prime-inbox-alloc",
    "runtime-prime-reactor",
    "runtime-prime-bgpool",
    "dep:core_affinity",
    "runtime-tokio",
    "prime/prime-tokio-compat",
]

# inverted compat (design D2): each prime worker owns its own sister tokio
# current-thread runtime and ticks the prime executor inside `sister.block_on`,
# so raw `tokio::spawn` from a prime task is LOCAL (no per-spawn kevent). Forwards
# to `prime/prime-tokio-compat-inverted`; mirrors `prime-tokio-compat` above.
prime-tokio-compat-inverted = [
    "prime-tokio-compat",
    "prime/prime-tokio-compat-inverted",
]

# telemetry substrate is structural (always-on). only consumer-facing toggles
# that change the dependency closure remain as features.
histogram   = ["proxima-telemetry/histogram"]
otlp-http   = ["proxima-telemetry/otlp-http", "dep:prost"]
otlp-grpc   = ["proxima-telemetry/otlp-grpc", "otlp-http"]
macros      = ["proxima-telemetry/macros", "proxima-telemetry/std", "proxima-telemetry/emit", "dep:proxima-macros"]
# unified-instrument seam: a #[instrument]/#[span] close also records its
# duration into a per-name histogram, so one annotation yields a trace span AND
# a duration metric. Compile-time default-off firewall, forwarded from
# proxima-telemetry (see its Cargo.toml for the full discipline-gate note).
instrument-metrics = ["proxima-telemetry/instrument-metrics"]
# opt into the recorder's size-trigger pump wait (Recorder::pump_wait) for
# spawn_prime_pump (src/otlp.rs); without it the pump falls back to a plain
# flush-interval sleep, which is equivalent when no producer ever parks.
lossless-backpressure = ["proxima-telemetry/lossless-backpressure"]
# #[proxima::test] harness. test-support exposes the test_support module +
# the test attribute, and is RUNTIME-AGNOSTIC: it does NOT pull `runtime-tokio`.
# A test harness must not force the tokio SERVE runtime onto every co-built
# crate — via cargo feature-unification that flipped proxima's own serve runtime
# to tokio while the http upstream stayed prime, breaking the prime TcpStream
# connect (CURRENT_REACTOR null -> 502). `test-prime` is the explicit prime
# execution path; crates that genuinely need a tokio serve runtime opt into
# `runtime-tokio` themselves. Serve stays prime-first regardless (see
# App::default_runtime: serve-prime wins over a merely-linked runtime-tokio).
test-support = ["macros"]
test-prime   = ["test-support", "prime-tokio-compat", "prime/prime-tokio-compat", "proxima-test/test-prime"]
runtime-prime-full    = ["proxima-primitives/runtime-prime-full", "proxima-runtime/runtime-prime-full", "prime?/runtime-prime-full", "proxima-net/runtime-prime-full"]
# perf knobs (compose with sub-flags)
simd-hex     = []
simd-varint  = []


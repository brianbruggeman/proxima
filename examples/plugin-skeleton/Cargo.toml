[package]
name = "proxima-plugin-skeleton"
description = "canonical plugin skeleton for proxima — copy this dir, rename, and replace the example middleware with your own"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
publish = false

[dependencies]
bytes.workspace = true
proxima-primitives = { workspace = true, features = ["std"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }

[dev-dependencies]
proxima = { workspace = true, features = ["test-support"] }
proxima-primitives = { workspace = true, features = ["std"] }

[lints]
workspace = true

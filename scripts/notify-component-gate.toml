# proxima-notify component → (package, feature, bench, tier) mapping.
# Single source of truth for scripts/notify-component-gate.sh and the
# .github/workflows/proxima-notify.yml CI matrix.
#
# Tier semantics:
#   "tier-1" → cargo build -p <package> --no-default-features --features alloc,<feature>
#   "tier-2" → cargo build -p <package> --features <feature>  (std defaults assumed)
#   "tier-3" → cargo build -p <package> --no-default-features --features <feature>  (no alloc)
#
# Components S1..S3 are SUBSTRATE; C1..C10 are NOTIFY components. The full
# 13-point gate from /disciplined-component applies to every row.

[S1]
package = "proxima-recording"
feature = "durable-wal"
bench   = "bench_proxima_notify_s1_durable_wal"
tier    = "tier-2"
description = "Durable WAL upgrade: BinSink::sync_now + BinSource::seek_to_offset + tail_from_offset."

[S2]
package = "proxima"
feature = "runtime-tokio"
bench   = "bench_proxima_notify_s2_producer_lifecycle"
tier    = "tier-2"
description = "Producer-lifecycle driver in src/app.rs: App::run_until_signal spawns every App::source(...) SourcePipe onto a ProducerLifecycle unconditionally (proxima-pipe TARGET 4 — no feature gate; sources drive once registered, like a handler serves once mounted)."

[S3]
package = "proxima"
feature = "producer-graph-config"
bench   = "bench_proxima_notify_s3_producer_graph_config"
tier    = "tier-2"
description = "Producer-graph schema in ProximaSettings: producers BTreeMap registry."

[C1]
package = "proxima-notify-proto"
feature = "proxima-notify-proto"
bench   = "bench_proxima_notify_proto"
tier    = "tier-3"
description = "Tier-3 sans-IO: AlertEvent + GuidanceQuestion + GuidanceAnswer + postcard codec."

[C2]
package = "proxima-telegram-proto"
feature = "proxima-telegram-proto"
bench   = "bench_proxima_telegram_proto"
tier    = "tier-3"
description = "Tier-3 sans-IO: state-machine Telegram Bot API JSON codec."

[C3]
package = "proxima-patterns"
feature = "alert,scheduled-trigger"
bench   = "bench_proxima_notify_c3_scheduled_trigger"
tier    = "tier-2"
description = "Std facade: ScheduledTriggerPipe (interval | cron). proxima-notify folded into proxima-patterns::alert."

[C4]
package = "proxima-patterns"
feature = "alert,stdout-alert"
bench   = "bench_proxima_notify_c4_stdout_alert"
tier    = "tier-2"
description = "Std facade: StdoutAlertPipe (terminal sink). proxima-notify folded into proxima-patterns::alert."

[C5]
package = "proxima-patterns"
feature = "alert,stdio-guidance"
bench   = "bench_proxima_notify_c5_stdio_guidance"
tier    = "tier-2"
description = "Std facade: StdioGuidancePipe (duplex sync stdin/stdout). proxima-notify folded into proxima-patterns::alert."

[C6]
package = "proxima-notify"
feature = "webhook-out"
bench   = "bench_proxima_notify_c6_webhook_out"
tier    = "tier-2"
description = "Std facade: WebhookOutPipe (HTTP POST sink with HMAC)."

[C7]
package = "proxima-recording"
feature = "offset-cursor"
bench   = "bench_proxima_notify_c7_offset_cursor"
tier    = "tier-2"
description = "Std facade: OffsetCursor (atomic-rename byte offset persistence)."

[C8]
package = "proxima-recording"
feature = "durable-consumer"
bench   = "bench_proxima_notify_c8_durable_consumer"
tier    = "tier-2"
description = "Std facade: DurableConsumerPipe (at-least-once event drain via BinSource tail)."

[C9]
package = "proxima-telegram"
feature = "telegram-out"
bench   = "bench_proxima_telegram_c9_out"
tier    = "tier-2"
description = "Std facade: TelegramOutPipe (one-way sendMessage sink)."

[C10]
package = "proxima-telegram"
feature = "telegram-guidance"
bench   = "bench_proxima_telegram_c10_guidance"
tier    = "tier-2"
description = "Std facade: TelegramGuidancePipe (duplex; long-poll BackgroundTask + correlation map)."

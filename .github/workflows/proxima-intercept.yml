name: proxima-intercept

# CI substrate for the proxima-intercept initiative (principle 16:
# execution must not outrun proof). Every C9 row only seals when this
# workflow is GREEN on the seal commit. Sealed rows re-prove their
# claim on every commit thereafter; drift unseals the row.
#
# Bootstrap mode validates artifacts (discipline.md present, gate script
# executable, examples register). Component jobs run the per-component
# gate (build / tests / clippy --no-deps).

on:
  push:
    branches: [main, "feat/proxima-intercept"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    uses: ./.github/workflows/affected.yml

  bootstrap:
    name: bootstrap artifacts present
    needs: changes
    if: needs.changes.outputs.intercept == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: discipline log present
        run: test -f proxima-intercept/docs/intercept-pipeline/discipline.md

      - name: c9 row present in discipline log
        run: grep -q '^## C9 — Request/Response Capture' proxima-intercept/docs/intercept-pipeline/discipline.md

      - name: gate script executable
        run: test -x scripts/intercept-component-gate.sh

      - name: capture module present
        run: test -f proxima-intercept/src/capture.rs

      - name: capture+inspect+replay examples register in Cargo.toml
        run: |
          grep -q 'name = "vscode-proxy-capture"' proxima-intercept/Cargo.toml
          grep -q 'name = "inspect-capture"' proxima-intercept/Cargo.toml
          grep -q 'name = "replay-capture"' proxima-intercept/Cargo.toml

      - name: vendored observe captures present (§16 substrate)
        run: |
          test -f spec/examples/copilot-responses-observe.jsonl
          test -f spec/examples/claude-messages-observe.jsonl
          test -f spec/examples/codex-response-create-observe.jsonl

  gate-c9-capture:
    name: gate C9 (intercept-capture)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: bash scripts/intercept-component-gate.sh c9-capture

  gate-c9-replay:
    name: gate C9-replay (intercept-replay = capture + replay)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: bash scripts/intercept-component-gate.sh c9-replay
      - name: replay example builds
        run: cargo build -p proxima-intercept --features intercept-replay --example replay-capture

  gate-c9-config:
    name: gate C9-config (intercept-config = capture + Settings)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: bash scripts/intercept-component-gate.sh c9-config

  bench-smoke:
    name: bench harness smoke (10 samples / 1s measurement / 1s warm-up)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: bench runs end-to-end (not just builds)
        run: |
          cargo bench \
            -p proxima-intercept \
            --features intercept-capture \
            --bench bench_intercept_capture \
            -- \
            --sample-size 10 \
            --measurement-time 1 \
            --warm-up-time 1

  websocket-frame:
    name: websocket-frame (RFC 6455 + negotiated permessage-deflate RSV1)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: tests
        run: cargo nextest run -p proxima-protocols --features websocket_frame -E 'test(websocket_frame::)'
      - name: clippy --no-deps
        run: cargo clippy --no-deps -p proxima-protocols --lib --tests --features websocket_frame -- -D warnings

  websocket-handshake:
    name: websocket-handshake (RFC 6455 §1.3 accept-key derive + verify)
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: tests (RFC 6455 §1.3 vector)
        run: cargo nextest run -p proxima-protocols --features websocket_handshake -E 'test(websocket_handshake::)'
      - name: clippy --no-deps
        run: cargo clippy --no-deps -p proxima-protocols --lib --tests --features websocket_handshake -- -D warnings

# CI areas for change-scoped gates (consumed by scripts/ci-affected.py).
# An area runs when a changed file is in one of its packages' Cargo
# dependency closure, OR matches one of its path globs. A change to a shared
# leaf crate fans out to every area that depends on it automatically.

[area.prime_serve]
packages = ["proxima"]
paths = ["scripts/prime-serve-gate.sh", ".github/workflows/prime-serve.yml"]

[area.pgwire]
packages = ["proxima-pgwire"]
paths = ["scripts/proxima-pgwire-gate.sh", ".github/workflows/proxima-pgwire.yml"]

[area.redis]
packages = ["proxima-redis"]
paths = ["scripts/proxima-redis-gate.sh", ".github/workflows/proxima-redis.yml"]

# The five protocol crates (memcached/dns/kafka/mqtt/amqp) all depend on
# proxima-listen through their optional `listen` feature — an optional dep
# isn't in the default-feature resolve graph cargo-metadata walks, so the
# dependency-closure detection above can't see it. proxima-listen and
# proxima-protocols are path-globbed explicitly so a change to either shared
# driver still trips this area (a proxima-listen change breaking kafka must
# not stay green).
[area.protocol_fleet]
packages = ["proxima-memcached", "proxima-dns", "proxima-kafka", "proxima-mqtt", "proxima-amqp"]
paths = [
    "scripts/protocol-fleet-gate.sh",
    ".github/workflows/proxima-protocol-fleet.yml",
    "proxima-memcached/**",
    "proxima-dns/**",
    "proxima-kafka/**",
    "proxima-mqtt/**",
    "proxima-amqp/**",
    "proxima-listen/**",
    "proxima-protocols/**",
]

[area.telemetry]
packages = ["proxima-telemetry"]
paths = ["scripts/telemetry-gate.sh", ".github/workflows/proxima-telemetry.yml"]

[area.nostd]
packages = [
    "prime",
    "proxima-protocols",
    "proxima-primitives",
    "proxima-patterns",
    "proxima-recording",
    "proxima-listeners-stream",
    "proxima-listen",
    "proxima-net",
    "proxima-runtime",
    "proxima-core",
]
paths = [
    "scripts/nostd-gate.sh",
    "scripts/nostd-gate.awk",
    "scripts/quic-h3-gate.sh",
    "scripts/tier-lift-gate.sh",
    "scripts/tokio-free-floor.sh",
    "scripts/thumbv7m-cliff-gate.sh",
    "scripts/_floor-crate-matrix.sh",
    ".github/workflows/no-std.yml",
]

[area.dpdk_stack]
packages = ["proxima-protocols"]
paths = [
    "scripts/dpdk-stack-gate.sh",
    ".github/workflows/dpdk-stack.yml",
]
